<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#faviconGradient)"/>
  
  <!-- M shape representing manufacturing/factory -->
  <g transform="translate(12, 16)">
    <rect x="0" y="16" width="5" height="16" rx="1" fill="white" opacity="0.95"/>
    <rect x="9" y="8" width="5" height="24" rx="1" fill="white"/>
    <rect x="18" y="12" width="5" height="20" rx="1" fill="white"/>
    <rect x="27" y="8" width="5" height="24" rx="1" fill="white"/>
    <rect x="36" y="16" width="5" height="16" rx="1" fill="white" opacity="0.95"/>
    
    <!-- Top line forming M -->
    <path d="M 2.5 16 L 11.5 8 L 20.5 12 L 29.5 8 L 38.5 16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
